kind = "web"
previewPath = "/"
title = "Penny Pincher API Tests"
version = "1.0.0"
id = "artifacts/penny-pincher-tests"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8000

[services.development]
run = "pnpm --filter @workspace/penny-pincher-tests run dev"

[services.env]
PORT = "8000"
BASE_PATH = "/"

[services.production]
serve = "static"
publicDir = "artifacts/penny-pincher-tests/dist/public"
rewrites = [{ from = "/*", to = "/index.html" }]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/penny-pincher-tests", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
PORT = "8000"
